query FindJournalpost($id: String!) {
    journalpost(journalpostId: $id) {
        avsenderMottaker {
            id
            navn
        }
        bruker {
            id
            type
        }
        datoOpprettet
        dokumenter {
            tittel
            dokumentInfoId
            brevkode
            dokumentvarianter {
                variantformat
                filnavn
                filuuid
                filtype
            }
        }
        journalposttype
        journalstatus
        kanal
        kanalnavn
        opprettetAvNavn
        sak {
            arkivsaksnummer
            arkivsaksystem
        }
        skjerming
        tema
        temanavn
        tittel
    }
}
